<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>

    <div class="top-banner">
        <a href="index.html">
            <img src="images/logo.png" alt="Logo" onerror="this.src='https://placehold.co/150x50?text=LOGO';">
        </a>
    </div>

    <div class="auth-container">
        <h2>ĐĂNG KÝ</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="regFullName" placeholder="Nhập họ và tên..." required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Nhập email..." required>
            </div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="regUsername" placeholder="Nhập tên đăng nhập..." required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="regPassword" placeholder="Nhập mật khẩu..." required>
            </div>
            <button type="submit" class="auth-btn">TẠO TÀI KHOẢN</button>
            
            <div class="auth-links">
                <a href="login.html">Đã có tài khoản? Đăng nhập tại đây</a>
            </div>
        </form>

        <div class="divider">
            <span>Hoặc đăng ký bằng</span>
        </div>
        <div class="social-auth">
            <button type="button" class="social-btn google-btn" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Google
            </button>
            <button type="button" class="social-btn facebook-btn" onclick="loginWithFacebook()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png" alt="Facebook">
                Facebook
            </button>
        </div>

        <div id="authMessage" class="message"></div>
    </div>

<script>
    const msgBox = document.getElementById('authMessage');
    
    function showMessage(msg, isSuccess = false) {
        msgBox.textContent = msg;
        msgBox.className = 'message ' + (isSuccess ? 'success' : 'error');
    }

    // Đăng ký thông thường
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const data = {
            fullName: document.getElementById('regFullName').value,
            email: document.getElementById('regEmail').value,
            userName: document.getElementById('regUsername').value,
            password: document.getElementById('regPassword').value
        };

        try {
            const res = await fetch('http://127.0.0.1:5000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.success) {
                showMessage(result.message + " Đang chuyển trang...", true);
                setTimeout(() => window.location.href = 'login.html', 1500); 
            } else {
                showMessage(result.message, false);
            }
        } catch (err) { 
            showMessage("Lỗi kết nối máy chủ", false); 
        }
    });

    // 2. Xử lý chuyển hướng Đăng nhập Google/Facebook
    function loginWithGoogle() {
        window.location.href = 'http://127.0.0.1:5000/api/auth/google';
    }

    function loginWithFacebook() {
        window.location.href = 'http://127.0.0.1:5000/api/auth/facebook';
    }
</script>
</body>
</html>
