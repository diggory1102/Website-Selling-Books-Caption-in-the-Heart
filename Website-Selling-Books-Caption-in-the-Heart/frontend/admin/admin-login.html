<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị - Caption In The Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../client/css/signup.css">
    <style>
        /* Tinh chỉnh riêng cho trang Admin để phân biệt với trang khách */
        .top-banner { background-color: #9bd8fc; } /* Màu tối hơn cho chuyên nghiệp */
        .auth-container h2 { color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        .auth-btn { background-color: #2c3e50; }
        .auth-btn:hover { background-color: #34495e; }
        .admin-badge {
            background: #e74c3c; color: white; padding: 2px 8px;
            border-radius: 4px; font-size: 10px; vertical-align: middle; margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="top-banner">
        <a href="../client/index.html">
            <img src="../client/images/logo.png" alt="Logo">
        </a>
    </div>

    <div class="auth-container">
        <h2>ĐĂNG NHẬP NỘI BỘ<br><span class="admin-badge">ADMIN / STAFF</span></h2>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Email công việc</label>
                <input type="email" id="adminEmail" placeholder="Nhập email nhân viên..." required>
            </div>
            <div class="form-group">
                <label>Mật khẩu hệ thống</label>
                <input type="password" id="adminPassword" placeholder="Nhập mật khẩu..." required>
            </div>
            
            <button type="submit" class="auth-btn">VÀO HỆ THỐNG QUẢN TRỊ</button>
            
            <div id="messageBox" class="message"></div>

            <div class="auth-links" style="margin-top: 20px;">
                <p>Đây là khu vực hạn chế. Truy cập trái phép sẽ bị ghi lại IP.</p>
                <a href="../client/index.html">← Quay lại trang chủ khách hàng</a>
            </div>
        </form>
    </div>

    <script src="js/admin-login.js"></script>
</body>
</html>
