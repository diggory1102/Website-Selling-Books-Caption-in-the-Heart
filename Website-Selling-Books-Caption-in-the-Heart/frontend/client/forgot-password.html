<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khôi phục mật khẩu - Caption In The Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>

    <div class="top-banner">
        <a href="index.html">
            <img src="images/logo.png" alt="Logo" onerror="this.src='https://placehold.co/150x50?text=LOGO';">
        </a>
    </div>

    <div class="auth-container">
        <h2>KHÔI PHỤC MẬT KHẨU</h2>
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.5;">
            Vui lòng nhập email bạn đã dùng để đăng ký. Hệ thống sẽ gửi một <b>liên kết</b> hoặc <b>mã OTP</b> đến email để bạn đặt lại mật khẩu mới.
        </p>
        
        <form id="forgotForm">
            <div class="form-group">
                <label>Email xác thực</label>
                <input type="email" id="forgotEmail" placeholder="Nhập địa chỉ Email của bạn..." required>
            </div>
            <button type="submit" class="auth-btn">GỬI YÊU CẦU KHÔI PHỤC</button>
            
            <div class="auth-links" style="margin-top: 20px;">
                <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Quay lại trang Đăng nhập</a>
            </div>
        </form>
        <div id="authMessage" class="message"></div>
    </div>

<script>
    const msgBox = document.getElementById('authMessage');
    function showMessage(msg, isSuccess = false) {
        msgBox.textContent = msg;
        msgBox.className = 'message ' + (isSuccess ? 'success' : 'error');
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgotEmail').value;

        try {
            // Gọi API kiểm tra email
            const res = await fetch('http://127.0.0.1:5000/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const result = await res.json();
            
            if (result.success) {
                // Thông báo bám sát đặc tả
                showMessage("Đã gửi liên kết và mã OTP khôi phục đến email của bạn! Vui lòng kiểm tra hộp thư.", true);
                
                // Sau khi gửi thành công, làm trống ô nhập liệu
                document.getElementById('forgotEmail').value = '';
            } else {
                showMessage(result.message, false);
            }
        } catch (err) { 
            showMessage("Lỗi kết nối máy chủ. Vui lòng thử lại sau.", false); 
        }
    });
</script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
