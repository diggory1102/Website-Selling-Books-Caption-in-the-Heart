<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả tìm kiếm - Caption In The Heart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styleindex.css">
    <style>
        .search-result-header { margin: 30px 0; padding-bottom: 10px; border-bottom: 2px solid var(--primary-color); }
        .search-result-header h2 { font-size: 20px; color: #333; }
        .search-result-header span { color: var(--secondary-color); }
        .no-results { text-align: center; padding: 50px; font-size: 18px; color: #888; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <div class="logo">
                <a href="index.html"><img src="images/logo.png" alt="Logo"></a>
            </div>
            <div class="search-bar">
                <input style="border-radius: 15px;" type="text" id="searchInput" name="search" autocomplete="off" placeholder="Tìm kiếm truyện tranh, tác giả...">
                <button style="border-radius: 5px;" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</button>
            </div>
            </div>
    </header>

    <main class="container">
        <div class="search-result-header">
            <h2 id="searchTitle">Đang tìm kiếm...</h2>
        </div>

        <div class="product-grid" id="searchGrid"></div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
